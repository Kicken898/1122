name: manual-build
    2                                                                           
    3 on:
    4   workflow_dispatch:
    5     inputs:
    6       platform:
    7         description: 'Target platform'
    8         required: true
    9         type: choice
   10         options:
   11           - all
   12           - android
   13           - ios
   14           - macos
   15           - linux
   16           - windows
   17         default: all
   18       build_type:
   19         description: 'Build type'
   20         required: true
   21         type: choice
   22         options:
   23           - release
   24           - debug
   25         default: release
   26       flutter_version:
   27         description: 'Flutter version'
   28         required: false
   29         type: string
   30         default: '3.38.x'
   31
   32 jobs:
   33   analyze:
   34     name: Analyze & Test
   35     runs-on: ubuntu-latest
   36     steps:
   37       - uses: actions/checkout@v4
   38
   39       - name: Setup Flutter
   40         uses: subosito/flutter-action@v2
   41         with:
   42           flutter-version: ${{ inputs.flutter_version }}
   43           cache: true
   44
   45       - name: Core pub get
   46         run: |
   47           cd simple_live_core
   48           flutter pub get
   49
   50       - name: Analyze core
   51         run: |
   52           cd simple_live_core
   53           dart analyze --fatal-infos
   54
   55       - name: App pub get
   56         run: |
   57           cd simple_live_app
   58           flutter pub get
   59
   60       - name: Analyze app
   61         run: |
   62           cd simple_live_app
   63           dart analyze --fatal-infos
   64
   65       - name: Run tests
   66         run: |
   67           cd simple_live_app
   68           flutter test --coverage 2>/dev/null || true
   69
   70       - name: Upload coverage
   71         uses: codecov/codecov-action@v4
   72         if: always()
   73         with:
   74           files: ./coverage/lcov.info
   75           fail_ci_if_error: false
   76
   77   build-android:
   78     name: Build Android
   79     needs: analyze
   80     if: github.event.inputs.platform == 'all' || github.event.inputs.pl
      atform == 'android'
   81     runs-on: ubuntu-latest
   82     steps:
   83       - uses: actions/checkout@v4
   84
   85       - name: Download Android keystore
   86         id: android_keystore
   87         uses: timheuer/base64-to-file@v1.2
   88         with:
   89           fileName: keystore.jks
   90           encodedString: ${{ secrets.KEYSTORE_BASE64 }}
   91
   92       - name: Create key.properties
   93         run: |
   94           echo "storeFile=${{ steps.android_keystore.outputs.filePath }
      }" > simple_live_app/android/key.properties
   95           echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> simple_
      live_app/android/key.properties
   96           echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> simple_live
      _app/android/key.properties
   97           echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> simple_live_app/a
      ndroid/key.properties
   98
   99       - uses: actions/setup-java@v4
  100         with:
  101           distribution: "zulu"
  102           java-version: "17"
  103           cache: "gradle"
  104
  105       - name: Setup Flutter
  106         uses: subosito/flutter-action@v2
  107         with:
  108           flutter-version: ${{ inputs.flutter_version }}
  109           cache: true
  110
  111       - name: Flutter pub get
  112         run: cd simple_live_app && flutter pub get
  113
  114       - name: Build APK
  115         run: |
  116           cd simple_live_app
  117           flutter build apk --${{ inputs.build_type }} --split-per-abi
  118
  119       - name: Upload APK
  120         uses: actions/upload-artifact@v4
  121         with:
  122           name: android-apk
  123           path: |
  124             simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v
      7a-${{ inputs.build_type }}.apk
  125             simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a
      -${{ inputs.build_type }}.apk
  126             simple_live_app/build/app/outputs/flutter-apk/app-x86_64-${
      { inputs.build_type }}.apk
  127
  128   build-ios:
  129     name: Build iOS
  130     needs: analyze
  131     if: github.event.inputs.platform == 'all' || github.event.inputs.pl
      atform == 'ios'
  132     runs-on: macos-latest
  133     steps:
  134       - uses: actions/checkout@v4
  135
  136       - name: Setup Flutter
  137         uses: subosito/flutter-action@v2
  138         with:
  139           flutter-version: ${{ inputs.flutter_version }}
  140           cache: true
  141
  142       - name: Flutter pub get
  143         run: cd simple_live_app && flutter pub get
  144
  145       - name: Build iOS
  146         run: |
  147           cd simple_live_app
  148           flutter build ios --${{ inputs.build_type }} --no-codesign
  149
  150       - name: Create IPA
  151         run: |
  152           cd simple_live_app
  153           mkdir -p build/ios/iphoneos/Payload
  154           cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payloa
      d/Runner.app
  155           cd build/ios/iphoneos/
  156           zip -q -r ios_no_sign.ipa Payload
  157
  158       - name: Upload IPA
  159         uses: actions/upload-artifact@v4
  160         with:
  161           name: ios-ipa
  162           path: simple_live_app/build/ios/iphoneos/ios_no_sign.ipa
  163
  164   build-macos:
  165     name: Build macOS
  166     needs: analyze
  167     if: github.event.inputs.platform == 'all' || github.event.inputs.pl
      atform == 'macos'
  168     runs-on: macos-latest
  169     steps:
  170       - uses: actions/checkout@v4
  171
  172       - name: Setup Flutter
  173         uses: subosito/flutter-action@v2
  174         with:
  175           flutter-version: ${{ inputs.flutter_version }}
  176           cache: true
  177
  178       - name: Enable Flutter Desktop
  179         run: flutter config --enable-macos-desktop
  180
  181       - name: Flutter pub get
  182         run: cd simple_live_app && flutter pub get
  183
  184       - name: Install flutter_distributor
  185         run: dart pub global activate flutter_distributor
  186
  187       - name: Build macOS
  188         run: |
  189           cd simple_live_app
  190           flutter_distributor package --platform macos --targets dmg,zi
      p --skip-clean
  191
  192       - name: Upload macOS
  193         uses: actions/upload-artifact@v4
  194         with:
  195           name: macos
  196           path: |
  197             simple_live_app/build/dist/*/*.dmg
  198             simple_live_app/build/dist/*/*.zip
  199
  200   build-linux:
  201     name: Build Linux
  202     needs: analyze
  203     if: github.event.inputs.platform == 'all' || github.event.inputs.pl
      atform == 'linux'
  204     runs-on: ubuntu-22.04
  205     steps:
  206       - uses: actions/checkout@v4
  207
  208       - name: Setup Flutter
  209         uses: subosito/flutter-action@v2
  210         with:
  211           flutter-version: ${{ inputs.flutter_version }}
  212           cache: true
  213
  214       - name: Install Dependencies
  215         run: sudo apt-get update && sudo apt-get install -y clang cmake
       ninja-build pkg-config libgtk-3-dev liblzma-dev libasound2-dev libmpv-
      dev mpv
  216
  217       - name: Enable Flutter Desktop
  218         run: flutter config --enable-linux-desktop
  219
  220       - name: Flutter pub get
  221         run: cd simple_live_app && flutter pub get
  222
  223       - name: Install flutter_distributor
  224         run: dart pub_global activate flutter_distributor
  225
  226       - name: Build Linux
  227         run: |
  228           cd simple_live_app
  229           flutter_distributor package --platform linux --targets deb,zi
      p --skip-clean
  230
  231       - name: Upload Linux
  232         uses: actions/upload-artifact@v4
  233         with:
  234           name: linux
  235           path: |
  236             simple_live_app/build/dist/*/*.deb
  237             simple_live_app/build/dist/*/*.zip
  238
  239   build-windows:
  240     name: Build Windows
  241     needs: analyze
  242     if: github.event.inputs.platform == 'all' || github.event.inputs.pl
      atform == 'windows'
  243     runs-on: windows-latest
  244     steps:
  245       - uses: actions/checkout@v4
  246
  247       - name: Setup Flutter
  248         uses: subosito/flutter-action@v2
  249         with:
  250           flutter-version: ${{ inputs.flutter_version }}
  251           cache: true
  252
  253       - name: Enable Flutter Desktop
  254         run: flutter config --enable-windows-desktop
  255
  256       - name: Flutter pub get
  257         run: cd simple_live_app && flutter pub get
